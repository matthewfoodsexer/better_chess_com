<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KB Move Practice</title>
<style>
body { font-family: monospace; background: #1a1a1d; color: #e4e4e7; margin: 40px; }
#stages { margin-bottom: 20px; }
#stages button { background: #333; color: #aaa; border: 1px solid #555; padding: 6px 14px; margin-right: 4px; cursor: pointer; font-family: monospace; }
#stages button.active { background: #2d5a2d; color: #81b64c; border-color: #81b64c; }
#prompt { font-size: 48px; margin: 30px 0 10px; letter-spacing: 4px; }
#hint { display: none; }
#input-display { font-size: 36px; color: #81b64c; margin: 10px 0; min-height: 44px; letter-spacing: 2px; }
#result { font-size: 18px; min-height: 24px; margin: 10px 0; }
.correct { color: #81b64c; }
.wrong { color: #e5533b; }
#stats { margin: 20px 0; color: #888; }
#stats span { margin-right: 20px; }
#time { color: #e4e4e7; }
#ref { margin-top: 30px; border: 1px solid #333; padding: 12px; display: inline-block; }
#ref table { border-collapse: collapse; }
#ref td { padding: 3px 10px; text-align: center; }
#ref .active-key { color: #81b64c; }
#ref .inactive-key { color: #333; }
#streak { font-size: 14px; color: #888; min-height: 20px; }
</style>
</head>
<body>

<div id="stages"></div>

<div id="prompt"></div>
<div id="hint"></div>
<div id="input-display"></div>
<div id="result"></div>
<div id="streak"></div>

<div id="stats">
  <span>Speed: <span id="time">-</span></span>
  <span>Avg: <span id="avg">-</span></span>
  <span>Score: <span id="score">0/0</span></span>
</div>

<div id="ref"></div>

<script>
// Key maps
const F2K = {a:"A",b:"S",c:"D",d:"F",e:"Q",f:"W",g:"E",h:"R"};
const R2K = {"1":"J","2":"K","3":"L","4":";","5":"U","6":"I","7":"O","8":"P"};
const K2F = {a:"a",s:"b",d:"c",f:"d",q:"e",w:"f",e:"g",r:"h"};
const K2R = {j:"1",k:"2",l:"3",";":"4",u:"5",i:"6",o:"7",p:"8"};

const FILES = "abcdefgh";
const RANKS = "12345678";

// Stages
const STAGES = [
  { name: "1. Files (home)", type: "file", keys: "asdf", desc: "a b c d" },
  { name: "2. Files (all)", type: "file", keys: "asdfqwer", desc: "a-h" },
  { name: "3. Ranks (home)", type: "rank", keys: "jkl;", desc: "1 2 3 4" },
  { name: "4. Ranks (all)", type: "rank", keys: "jkl;uiop", desc: "1-8" },
  { name: "5. Squares (home)", type: "square", files: "abcd", ranks: "1234" },
  { name: "6. Squares (all)", type: "square", files: "abcdefgh", ranks: "12345678" },
  { name: "7. Moves (home)", type: "move", files: "abcd", ranks: "1234" },
  { name: "8. Moves (all)", type: "move", files: "abcdefgh", ranks: "12345678" },
];

let stage = 0;
let buf = [];
let target = null;
let startTime = 0;
let correct = 0, total = 0;
let times = [];
let streak = 0;
let bestStreak = 0;
let wrongCount = {};  // track weak keys
const ADVANCE_THRESHOLD = 10; // correct in a row to unlock next

let unlocked = STAGES.length - 1;

function init() {
  renderStages();
  selectStage(Math.min(stage, unlocked));
}

function renderStages() {
  const el = document.getElementById("stages");
  el.innerHTML = "";
  STAGES.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.textContent = s.name;
    btn.className = i === stage ? "active" : i > unlocked ? "locked" : "";
    btn.onclick = () => { if (i <= unlocked) selectStage(i); };
    el.appendChild(btn);
  });
}

function selectStage(i) {
  stage = i;
  correct = 0; total = 0; times = []; streak = 0; bag = [];
  renderStages();
  renderRef();
  newRound();
  updateStats();
}

function renderRef() {
  const s = STAGES[stage];
  const el = document.getElementById("ref");
  let activeFiles = s.files || (s.type === "file" ? [...s.keys].map(k => K2F[k]) : FILES).join ? undefined : undefined;
  let activeRanks = s.ranks || (s.type === "rank" ? [...s.keys].map(k => K2R[k]) : RANKS).join ? undefined : undefined;

  // Determine which keys are active
  let aFiles = new Set(), aRanks = new Set();
  if (s.type === "file") { for (const k of s.keys) aFiles.add(K2F[k]); }
  else if (s.type === "rank") { for (const k of s.keys) aRanks.add(K2R[k]); }
  else { for (const f of (s.files||FILES)) aFiles.add(f); for (const r of (s.ranks||RANKS)) aRanks.add(r); }

  let html = '<table>';
  html += '<tr><td></td><td>Key</td><td></td><td></td><td>Key</td></tr>';
  for (let i = 0; i < 8; i++) {
    const f = FILES[i], r = RANKS[i];
    const fc = aFiles.has(f) ? "active-key" : "inactive-key";
    const rc = aRanks.has(r) ? "active-key" : "inactive-key";
    html += `<tr>
      <td class="${fc}">${f}</td><td class="${fc}">${F2K[f]}</td>
      <td style="width:20px"></td>
      <td class="${rc}">${r}</td><td class="${rc}">${R2K[r]}</td>
    </tr>`;
  }
  html += '</table>';
  el.innerHTML = html;
}

let bag = [];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildBag() {
  const s = STAGES[stage];
  const items = [];
  if (s.type === "file") {
    for (const k of s.keys) items.push([K2F[k]]);
  } else if (s.type === "rank") {
    for (const k of s.keys) items.push([K2R[k]]);
  } else if (s.type === "square") {
    for (const f of s.files) for (const r of s.ranks) items.push([f, r]);
  } else {
    const files = [...s.files], ranks = [...s.ranks];
    for (const f of files) for (const r of ranks) items.push([f, r]);
  }
  return shuffle(items);
}

function nextFromBag() {
  if (bag.length === 0) bag = buildBag();
  return bag.pop();
}

function newRound() {
  buf = [];
  const s = STAGES[stage];

  if (s.type === "move") {
    const sq1 = nextFromBag();
    let sq2 = nextFromBag();
    if (bag.length === 0) bag = buildBag();
    while (sq1[0] === sq2[0] && sq1[1] === sq2[1]) sq2 = nextFromBag();
    target = { answer: [...sq1, ...sq2], type: "move" };
  } else {
    const item = nextFromBag();
    target = { answer: item, type: s.type };
  }

  // Display prompt
  const a = target.answer;
  let promptText, hintText;
  if (target.type === "file") {
    promptText = a[0];
    hintText = F2K[a[0]];
  } else if (target.type === "rank") {
    promptText = a[0];
    hintText = R2K[a[0]];
  } else if (target.type === "square") {
    promptText = a[0] + a[1];
    hintText = F2K[a[0]] + R2K[a[1]];
  } else {
    promptText = a[0]+a[1] + " \u2192 " + a[2]+a[3];
    hintText = F2K[a[0]]+R2K[a[1]] + " " + F2K[a[2]]+R2K[a[3]];
  }

  document.getElementById("prompt").textContent = promptText;
  document.getElementById("hint").textContent = hintText;
  document.getElementById("input-display").textContent = "_".repeat(target.answer.length);
  document.getElementById("result").textContent = "";

  startTime = performance.now();
}

function updateStats() {
  const avg = times.length > 0 ? Math.round(times.reduce((a,b)=>a+b,0) / times.length) : "-";
  document.getElementById("avg").textContent = avg === "-" ? "-" : avg + "ms";
  document.getElementById("score").textContent = correct + "/" + total;
  document.getElementById("streak").textContent = streak > 1 ? streak + " combo" + (streak >= bestStreak && bestStreak > 2 ? " (best!)" : "") : "";

}

function check() {
  total++;
  const elapsed = Math.round(performance.now() - startTime);
  const ok = buf.join("") === target.answer.join("");

  if (ok) {
    correct++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    times.push(elapsed);
    if (times.length > 20) times.shift();
    document.getElementById("time").textContent = elapsed + "ms";
    document.getElementById("result").textContent = "";
    document.getElementById("result").className = "correct";

  } else {
    streak = 0;
    // Track wrong keys
    for (let i = 0; i < target.answer.length; i++) {
      if (buf[i] !== target.answer[i]) {
        wrongCount[target.answer[i]] = (wrongCount[target.answer[i]] || 0) + 1;
      }
    }
    const el = document.getElementById("result");
    el.className = "wrong";
    el.textContent = "miss";
    document.getElementById("time").textContent = "-";
  }

  updateStats();
  setTimeout(newRound, ok ? 300 : 800);
}

// Input handler
document.addEventListener("keydown", (ev) => {
  if (ev.key === "Escape") { buf = []; updateInputDisplay(); return; }
  if (ev.key === "Backspace") { buf.pop(); updateInputDisplay(); ev.preventDefault(); return; }
  if (!target) return;

  const key = ev.key.toLowerCase();
  const step = buf.length;
  const a = target.answer;

  if (target.type === "file") {
    if (K2F[key]) { buf.push(K2F[key]); ev.preventDefault(); updateInputDisplay(); check(); }
  } else if (target.type === "rank") {
    if (K2R[key]) { buf.push(K2R[key]); ev.preventDefault(); updateInputDisplay(); check(); }
  } else if (target.type === "square") {
    if (step === 0 && K2F[key]) { buf.push(K2F[key]); ev.preventDefault(); updateInputDisplay(); }
    else if (step === 1 && K2R[key]) { buf.push(K2R[key]); ev.preventDefault(); updateInputDisplay(); check(); }
  } else {
    // move: file rank file rank
    if ((step === 0 || step === 2) && K2F[key]) { buf.push(K2F[key]); ev.preventDefault(); updateInputDisplay(); }
    else if ((step === 1 || step === 3) && K2R[key]) {
      buf.push(K2R[key]); ev.preventDefault(); updateInputDisplay();
      if (buf.length === 4) check();
    }
  }
});

function updateInputDisplay() {
  const a = target.answer;
  let display = "";
  for (let i = 0; i < a.length; i++) {
    display += buf[i] || "_";
    if (target.type === "move" && i === 1) display += " ";
  }
  document.getElementById("input-display").textContent = display;
}

init();
</script>
</body>
</html>
